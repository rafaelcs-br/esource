<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div class="col">
        <div class="card mb-3">
            <div class="row g-0">
                <div class="col-4 d-flex justify-content-center align-items-center p-2">
                    <img src="https://img.icons8.com/ios-filled/100/magazine.png" class="img-fluid rounded-start"
                        alt="magazine" />
                </div>
                <div class="col-8">
                    <div class="card-body">
                        <h5 class="card-title fs-1">{{ total_artigos }}</h5>
                        <small class="text-body-secondary">{{ status_artigo|date:"d/m/Y - H:i" }}</small>
                    </div>
                </div>
                <div class="card-footer">Total de Artigos</div>
            </div>
        </div>
    </div>
    <div class="col">
        <div class="card mb-3" style="max-width: 540px;">
            <div class="row g-0">
                <div class="col-4 d-flex justify-content-center align-items-center">
                    <img src="https://img.icons8.com/ios/100/hand-with-pen.png" class="img-fluid rounded-start"
                        alt="hand-with-pen" />
                </div>
                <div class="col-8">
                    <div class="card-body">
                        <h5 class="card-title fs-1">{{ total_autores }}</h5>
                        <small class="text-body-secondary">{{ status_autor|date:"d/m/Y - H:i" }}</small>
                    </div>
                </div>
                <div class="card-footer">Total de Autores</div>
            </div>
        </div>
    </div>
    <div class="col mx-auto">
        <div class="card mb-3" style="max-width: 540px;">
            <div class="row g-0">
                <div class="col-4 d-flex justify-content-center align-items-center">
                    <img src="https://img.icons8.com/fluency-systems-regular/100/event.png"
                        class="img-fluid rounded-start" alt="hand-with-pen" />
                </div>
                <div class="col-8">
                    <div class="card-body">
                        <h5 class="card-title fs-1">{{ total_eventos }}</h5>
                        <small class="text-body-secondary">{{ status_evento|date:"d/m/Y - H:i" }}</small>
                    </div>
                </div>
                <div class="card-footer">Total de Eventos</div>
            </div>
        </div>
    </div>
</div>
